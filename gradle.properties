# ============================================================
# gradle.properties
# Package: com.konasl.nagad
# ============================================================

# AndroidX & Jetifier
android.useAndroidX=true
android.enableJetifier=true

# Kotlin Code Generation
kotlin.code.style=official
kotlin.incremental=true
kotlin.incremental.multiplatform=true
kotlin.parallel.tasks.in.project=true

# Gradle JVM Memory — NDK builds are memory-hungry
org.gradle.jvmargs=-Xmx8g -Xms2g -XX:MaxMetaspaceSize=1g \
  -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 \
  -XX:+UseParallelGC

# Gradle performance
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.caching=true
org.gradle.workers.max=8

# NDK Build
android.ndkVersion=26.1.10909125
android.enablePrefab=true
android.prefabVersion=2.0.0

# Build features
android.defaults.buildfeatures.buildconfig=true
android.nonTransitiveRClass=true
android.nonFinalResIds=false

# R8 / ProGuard
android.enableR8.fullMode=true

# Suppress specific warnings from virtual-app reflection
kotlin.suppress.expected.by.actual.typealias.check=true
